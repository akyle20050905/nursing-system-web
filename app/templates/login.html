<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護理站系統 - 登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #4338ca 100%);
        }
        .english-font {
            font-family: 'Outfit', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        /* Hidden by default in opacity, used for smooth transition */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 0.4s ease, transform 0.4s ease; }
        .fade-exit { opacity: 1; transform: translateY(0); }
        .fade-exit-active { opacity: 0; transform: translateY(-10px); transition: opacity 0.4s ease, transform 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white relative overflow-hidden">
    
    <!-- Decorative background elements -->
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-indigo-500/30 blur-[100px] pointer-events-none floating"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-fuchsia-500/20 blur-[120px] pointer-events-none floating" style="animation-delay: -3s;"></div>

    <div class="glass-panel w-full max-w-5xl rounded-[2.5rem] shadow-[0_30px_60px_rgba(0,0,0,0.4)] flex flex-col md:flex-row overflow-hidden relative z-10 min-h-[600px]">
        
        <!-- Left Side: Branding & Visuals -->
        <div class="w-full md:w-5/12 p-12 bg-white/5 flex flex-col justify-between border-r border-white/10 hidden md:flex">
            <div>
                <div class="w-16 h-16 bg-gradient-to-br from-indigo-400 to-fuchsia-500 rounded-2xl flex items-center justify-center mb-8 shadow-lg shadow-indigo-500/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
                <h1 class="text-4xl font-black mb-4 tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white to-indigo-200">護理站雲端系統</h1>
                <p class="text-indigo-200 leading-relaxed font-medium">智能、直覺、高效的醫療工作流程管理。請登入以存取您的跨班交接總表與病人資訊。</p>
            </div>
            
            <div class="mt-8">
                <div class="flex -space-x-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-indigo-500 border-2 border-indigo-900 flex items-center justify-center font-bold text-xs">N1</div>
                    <div class="w-10 h-10 rounded-full bg-fuchsia-500 border-2 border-indigo-900 flex items-center justify-center font-bold text-xs">N2</div>
                    <div class="w-10 h-10 rounded-full bg-cyan-500 border-2 border-indigo-900 flex items-center justify-center font-bold text-xs">N3</div>
                </div>
                <p class="text-sm font-bold text-indigo-300 english-font tracking-widest">NURSING STAFF SYSTEM</p>
            </div>
        </div>

        <!-- Right Side: Forms -->
        <div class="w-full md:w-7/12 p-8 md:p-16 relative">
            
            <div class="absolute top-8 right-8 flex space-x-2 bg-white/10 rounded-full p-1 border border-white/20">
                <button id="navLoginBtn" onclick="toggleView('login')" class="px-6 py-2 rounded-full text-sm font-bold transition-all bg-white text-indigo-900 shadow-md">登入</button>
                <button id="navRegBtn" onclick="toggleView('register')" class="px-6 py-2 rounded-full text-sm font-bold text-white/70 hover:text-white transition-all">註冊</button>
            </div>

            <!-- Login Form -->
            <div id="loginView" class="h-full flex flex-col justify-center mt-12 md:mt-0 opacity-100 transition-opacity duration-300">
                <h2 class="text-3xl font-black mb-2">歡迎回來</h2>
                <p class="text-indigo-200 mb-8 font-medium">請使用您的護理師編號與密碼登入</p>

                <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-indigo-100 mb-2 tracking-wide">護理師 ID (Nurse ID)</label>
                        <input type="text" id="loginId" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all hover:bg-white/15" placeholder="輸入您的編號 (如: 1)">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-100 mb-2 tracking-wide">密碼 (Password)</label>
                        <input type="password" id="loginPwd" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-6 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all hover:bg-white/15" placeholder="輸入密碼 (預設: 123456)">
                    </div>
                    
                    <button type="submit" id="loginSubmit" class="w-full bg-gradient-to-r from-indigo-500 to-fuchsia-500 hover:from-indigo-400 hover:to-fuchsia-400 text-white font-black py-4 rounded-2xl shadow-lg shadow-indigo-500/25 transform transition-all hover:-translate-y-1 active:translate-y-0 mt-4 text-lg">
                        登入系統
                    </button>
                    <p id="loginError" class="text-pink-400 font-bold text-sm text-center mt-4 hidden"></p>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerView" class="h-full flex flex-col justify-center mt-12 md:mt-0 hidden">
                <h2 class="text-3xl font-black mb-2">註冊護理師</h2>
                <p class="text-indigo-200 mb-8 font-medium">加入我們的醫療團隊</p>

                <form id="registerForm" onsubmit="handleRegister(event)" class="space-y-5">
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-bold text-indigo-100 mb-2">姓名</label>
                            <input type="text" id="regName" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-fuchsia-400 transition-all hover:bg-white/15" placeholder="姓名">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-indigo-100 mb-2">職級</label>
                            <select id="regLevel" class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-fuchsia-400 transition-all cursor-pointer [&>option]:bg-indigo-900">
                                <option value="N0">N0</option>
                                <option value="N1">N1</option>
                                <option value="N2">N2</option>
                                <option value="N3">N3</option>
                                <option value="N4">N4</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-100 mb-2">部門</label>
                        <input type="text" id="regDept" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-fuchsia-400 transition-all hover:bg-white/15" placeholder="如 ICU, ER">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-indigo-100 mb-2">設定密碼</label>
                        <input type="password" id="regPwd" required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-fuchsia-400 transition-all hover:bg-white/15" placeholder="設定您的登入密碼">
                    </div>
                    
                    <button type="submit" id="regSubmit" class="w-full bg-gradient-to-r from-fuchsia-500 to-pink-500 hover:from-fuchsia-400 hover:to-pink-400 text-white font-black py-4 rounded-2xl shadow-lg shadow-pink-500/25 transform transition-all hover:-translate-y-1 active:translate-y-0 mt-2 text-lg">
                        建立帳號
                    </button>
                    <p id="regMsg" class="font-bold text-sm text-center mt-4 hidden"></p>
                </form>
            </div>

        </div>
    </div>

    <script>
        function toggleView(view) {
            const loginView = document.getElementById('loginView');
            const registerView = document.getElementById('registerView');
            const navLoginBtn = document.getElementById('navLoginBtn');
            const navRegBtn = document.getElementById('navRegBtn');

            if (view === 'login') {
                registerView.classList.add('hidden');
                loginView.classList.remove('hidden');
                
                navLoginBtn.className = "px-6 py-2 rounded-full text-sm font-bold transition-all bg-white text-indigo-900 shadow-md";
                navRegBtn.className = "px-6 py-2 rounded-full text-sm font-bold text-white/70 hover:text-white transition-all";
            } else {
                loginView.classList.add('hidden');
                registerView.classList.remove('hidden');

                navRegBtn.className = "px-6 py-2 rounded-full text-sm font-bold transition-all bg-white text-indigo-900 shadow-md";
                navLoginBtn.className = "px-6 py-2 rounded-full text-sm font-bold text-white/70 hover:text-white transition-all";
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginSubmit');
            const errorEl = document.getElementById('loginError');
            btn.innerHTML = `驗證中...`;
            errorEl.classList.add('hidden');

            const payload = {
                nurse_id: document.getElementById('loginId').value,
                password: document.getElementById('loginPwd').value
            };

            const res = await fetch('/nurses/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (res.ok) {
                btn.innerHTML = `登入成功！`;
                btn.classList.replace('from-indigo-500', 'from-emerald-500');
                btn.classList.replace('to-fuchsia-500', 'to-teal-500');
                setTimeout(() => window.location.href = data.redirect, 500);
            } else {
                btn.innerHTML = `登入系統`;
                errorEl.textContent = data.error || '登入失敗，請檢查編號與密碼。';
                errorEl.classList.remove('hidden');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('regSubmit');
            const msgEl = document.getElementById('regMsg');
            btn.innerHTML = `建立中...`;
            msgEl.classList.add('hidden');

            const payload = {
                name: document.getElementById('regName').value,
                department: document.getElementById('regDept').value,
                level: document.getElementById('regLevel').value,
                password: document.getElementById('regPwd').value
            };

            const res = await fetch('/nurses/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (res.ok) {
                const data = await res.json();
                btn.innerHTML = `註冊成功！`;
                msgEl.textContent = `註冊成功！您的護理師ID為: ${data.id}，請記住此ID用於登入。`;
                msgEl.className = "text-emerald-400 font-bold text-sm text-center mt-4";
                document.getElementById('registerForm').reset();
                setTimeout(() => {
                    toggleView('login');
                    document.getElementById('loginId').value = data.id;
                    btn.innerHTML = `建立帳號`;
                }, 3000);
            } else {
                btn.innerHTML = `建立帳號`;
                msgEl.textContent = '註冊失敗，請稍後再試。';
                msgEl.className = "text-pink-400 font-bold text-sm text-center mt-4";
            }
        }
    </script>
</body>
</html>
