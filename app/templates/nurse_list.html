<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>護理站系統 - 護理師總覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen flex overflow-hidden text-slate-800">

    <aside class="w-64 bg-slate-900 text-slate-100 flex flex-col p-6 shadow-2xl z-10 shrink-0">
        <div
            class="text-2xl font-black border-b border-slate-700 text-center pb-6 mb-6 tracking-widest text-indigo-400">
            護理站系統</div>
        <nav class="flex-1 space-y-3">
            <a href="/tasks/dashboard"
                class="block px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all">跨班交接總表</a>
            <a href="/patients/"
                class="block px-4 py-3 text-slate-400 hover:text-white hover:bg-slate-800 rounded-xl transition-all">病人總覽頁</a>
            <a href="/nurses/ui"
                class="block px-4 py-3 bg-indigo-600 rounded-xl font-medium shadow-lg shadow-indigo-500/30">護理師總覽頁</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-8 border-b-2 border-slate-200 pb-4">
            <h1 class="text-3xl font-black tracking-widest text-slate-800">護理人員清單 <span
                    class="text-indigo-600 text-lg">Nurse Staff</span></h1>
            <button onclick="openModal()"
                class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-full font-bold shadow-lg transition-all">
                ＋ 新增護理師
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            {% for nurse in nurses %}
            <div class="bg-white rounded-3xl shadow-sm p-6 border border-slate-100 hover:-translate-y-1 transition-all">
                <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-4 text-indigo-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round"></path>
                    </svg>
                </div>
                <h3 class="text-xl font-black text-slate-800">{{ nurse.name }}</h3>
                <p class="text-indigo-600 font-bold text-sm mb-4">{{ nurse.level }} 護理師</p>
                <div class="text-xs text-slate-400 space-y-1 font-bold">
                    <p>部門：{{ nurse.department }}</p>
                    <p>ID：{{ nurse.id }}</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <!-- 新增護理師 Modal -->
    <div id="nurseModal"
        class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl">
            <h2 class="text-2xl font-black mb-6">新增護理師</h2>
            <form id="addNurseForm" onsubmit="submitNurse(event)" class="space-y-4 font-bold text-sm">
                <div><label class="block mb-1">姓名</label><input type="text" id="nName" required
                        class="w-full bg-slate-50 border p-3 rounded-xl"></div>
                <div><label class="block mb-1">部門</label><input type="text" id="nDept" placeholder="如 ICU, ER" required
                        class="w-full bg-slate-50 border p-3 rounded-xl"></div>
                <div><label class="block mb-1">職級</label><select id="nLevel"
                        class="w-full bg-slate-50 border p-3 rounded-xl">
                        <option value="N0">N0</option>
                        <option value="N1">N1</option>
                        <option value="N2">N2</option>
                        <option value="N3">N3</option>
                        <option value="N4">N4</option>
                    </select></div>
                <div class="flex justify-end space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-2 bg-slate-100 rounded-xl">取消</button>
                    <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-xl">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('nurseModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('nurseModal').classList.add('hidden'); }
        async function submitNurse(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('nName').value,
                department: document.getElementById('nDept').value,
                level: document.getElementById('nLevel').value
            };
            const res = await fetch('/nurses/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) location.reload(); else alert('新增失敗');
        }
    </script>
</body>

</html>
